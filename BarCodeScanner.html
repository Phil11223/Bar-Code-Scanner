<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee;
            min-height: 100vh; display: flex;
            flex-direction: column; align-items: center; padding: 16px;
        }

        /* ── Header ──────────────────────────────────────────────────────────── */
        header {
            width: 100%; max-width: 600px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding: 12px 16px;
            background: #16213e; border-radius: 12px;
            border-left: 4px solid #4cc9f0;
            position: relative;
        }
        header h1 { font-size: 1.2rem; color: #4cc9f0; flex: 1; }

        /* ── Floating menu (top-left of header) ───────────────────────────────
           The hamburger button sits inside the header flex row.
           The dropdown panel is absolute-positioned relative to the header.   */
        #menu-wrap { position: relative; flex-shrink: 0; }

        #menu-btn {
            width: 36px; height: 36px;
            background: #0f3460; border: 1px solid #4cc9f0;
            border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px;
            flex-shrink: 0; transition: background 0.2s;
        }
        #menu-btn:hover { background: #1a4d6e; }
        #menu-btn span {
            display: block; width: 16px; height: 2px;
            background: #4cc9f0; border-radius: 2px;
            transition: all 0.2s;
        }

        #menu-dropdown {
            position: absolute;
            top: calc(100% + 8px); left: 0;
            background: #16213e; border: 1px solid #2a4a6e;
            border-radius: 10px; min-width: 190px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100;
            /* Fade in/out */
            opacity: 0; pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #menu-dropdown.open {
            opacity: 1; pointer-events: auto; transform: translateY(0);
        }
        .menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px; cursor: pointer;
            font-size: 0.88rem; color: #ccc;
            transition: background 0.15s;
            border-radius: 10px;
        }
        .menu-item:hover { background: #0f3460; color: #eee; }

        /* Toggle switch inside menu */
        /* Pure div toggle — no <input>, no browser form-state restoration */
        .toggle-switch {
            position: relative; width: 36px; height: 20px;
            flex-shrink: 0; margin-left: auto;
        }
        .toggle-track {
            position: absolute; inset: 0;
            background: #333; border-radius: 20px;
            transition: background 0.2s; cursor: pointer;
        }
        .toggle-track::after {
            content: ''; position: absolute;
            width: 14px; height: 14px; border-radius: 50%;
            background: #888; top: 3px; left: 3px;
            transition: all 0.2s;
        }
        /* .on class applied by JS — never touched by browser cache */
        .toggle-switch.on .toggle-track { background: #4cc9f0; }
        .toggle-switch.on .toggle-track::after {
            background: #1a1a2e; left: 19px;
        }

        /* ── Cards ───────────────────────────────────────────────────────────── */
        .card {
            width: 100%; max-width: 600px; background: #16213e;
            border-radius: 16px; padding: 20px; margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .card h2 {
            font-size: 0.95rem; text-transform: uppercase;
            letter-spacing: 1px; color: #4cc9f0; margin-bottom: 14px;
        }

        /* ── Rescan prompt (above scanner, hidden by default) ────────────────── */
        #rescan-prompt {
            width: 100%; max-width: 600px;
            background: #0f3460; border: 1px solid #4cc9f0;
            border-radius: 10px; padding: 10px 16px;
            font-size: 0.85rem; color: #4cc9f0; font-weight: 600;
            text-align: center; margin-bottom: 10px;
            display: none;
            animation: fadeSlideIn 0.25s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Scanner container ───────────────────────────────────────────────── */
        #scanner-container {
            position: relative; width: 100%;
            aspect-ratio: 4 / 3; background: #000;
            border-radius: 12px; overflow: hidden;
            cursor: crosshair;
        }
        #camVideo {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            /* Own GPU layer — isolates per-frame video texture updates from
               the scan-line's compositor animation. Without this the video
               repaints bleed into the scan-line layer causing stutter. */
            will-change: transform;
        }
        .scan-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 92%; height: 38%;
            border: 2px solid #4cc9f0; border-radius: 6px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
            z-index: 10; pointer-events: none;
        }
        /* Overlay turns amber when in rescan mode */
        #scanner-container.rescan-mode .scan-overlay {
            border-color: #f4a261;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
        }
        .scan-line {
            position: absolute; left: 0; right: 0; top: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #4cc9f0, transparent);
            /* translateY animates on the GPU compositor — no layout reflow, always smooth.
               alternate bounces the line back up instead of snapping to start.
               will-change promotes to its own layer, preventing paint invalidation. */
            will-change: transform;
            animation: scanLine 1.8s ease-in-out infinite alternate;
        }
        #scanner-container.rescan-mode .scan-line {
            background: linear-gradient(90deg, transparent, #f4a261, transparent);
        }
        @keyframes scanLine {
            0%   { transform: translateY(0); }
            100% { transform: translateY(calc(var(--overlay-h, 120px) - 2px)); }
        }

        #scan-flash {
            position: absolute; inset: 0;
            background: rgba(45,198,83,0.35);
            z-index: 30; pointer-events: none; opacity: 0;
        }
        #scan-flash.pop { animation: flashPop 0.5s ease forwards; }
        @keyframes flashPop { 0%{opacity:1} 100%{opacity:0} }

        #tap-ripple {
            position: absolute; width: 60px; height: 60px;
            border-radius: 50%; background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none; z-index: 20;
        }
        #tap-ripple.burst { animation: rippleBurst 0.4s ease-out forwards; }
        @keyframes rippleBurst {
            0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        #tap-hint {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55); color: #4cc9f0;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
            padding: 4px 14px; border-radius: 20px;
            pointer-events: none; z-index: 15; display: none;
        }
        #scanner-container.rescan-mode #tap-hint { color: #f4a261; }

        /* ── Scan label (top-left overlay on video) ───────────────────────────
           Shows "Scan [column header]" so the user always knows what they're
           currently scanning. Colour matches the overlay border — blue for
           primary, amber when in rescan/item mode.                           */
        #scan-label {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.6);
            color: #4cc9f0;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 15;
            display: none;
            transition: color 0.2s ease;
        }
        #scanner-container.rescan-mode #scan-label { color: #f4a261; }

        /* Torch button — top-right corner of scanner, only shown on mobile */
        #torch-btn {
            position: absolute; top: 10px; right: 10px;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.55); border: 1.5px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 1.1rem; cursor: pointer;
            z-index: 15; display: none;
            align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        #torch-btn.on { background: rgba(255,220,0,0.85); border-color: #ffd700; color: #1a1a2e; }

        .flash { animation: cardFlash 0.7s ease forwards; }
        @keyframes cardFlash {
            0%   { box-shadow: 0 0 0 0px  rgba(45,198,83,0.9), 0 4px 20px rgba(0,0,0,0.4); }
            40%  { box-shadow: 0 0 0 10px rgba(45,198,83,0.5), 0 4px 20px rgba(0,0,0,0.4); }
            100% { box-shadow: 0 0 0 0px  rgba(45,198,83,0),   0 4px 20px rgba(0,0,0,0.4); }
        }

        #confirm-banner {
            display: none; align-items: center; gap: 10px;
            margin-top: 10px; padding: 10px 14px;
            background: #1a4d2e; border: 1px solid #2dc653;
            border-radius: 8px; font-size: 0.88rem; color: #2dc653; font-weight: 600;
        }
        #confirm-banner.show { display: flex; animation: bannerSlide 0.25s ease; }
        @keyframes bannerSlide {
            from { opacity:0; transform:translateY(-5px); }
            to   { opacity:1; transform:translateY(0); }
        }

        #hint { font-size:0.78rem; color:#888; margin-top:6px; min-height:1.4em; text-align:center; }

        .status-bar {
            display:flex; align-items:center; gap:8px; padding:10px 14px;
            border-radius:8px; font-size:0.85rem; margin-top:12px; background:#0f3460;
        }
        .dot { width:10px; height:10px; border-radius:50%; background:#888; flex-shrink:0; }
        .dot.active { background:#2dc653; animation:pulse 1s infinite; }
        .dot.error  { background:#e63946; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .btn-row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
        button { flex:1; padding:12px 16px; border:none; border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
        #startBtn    { background:#4cc9f0; color:#1a1a2e; }
        #startBtn:hover { background:#3ab8df; }
        #stopBtn     { background:#e63946; color:#fff; display:none; }
        #stopBtn:hover  { background:#c1121f; }
        #clearBtn    { background:#444; color:#eee; }
        #clearBtn:hover { background:#555; }
        #downloadBtn { background:#2dc653; color:#fff; }
        #downloadBtn:hover { background:#25a244; }

        .manual-row { display:flex; gap:8px; margin-top:4px; }
        .manual-row input { flex:1; padding:10px 14px; border-radius:8px; border:1px solid #333; background:#0f3460; color:#eee; font-size:0.9rem; outline:none; }
        .manual-row input:focus { border-color:#4cc9f0; }
        .manual-row button { flex:0 0 auto; padding:10px 18px; background:#4cc9f0; color:#1a1a2e; }

        /* ── Table ───────────────────────────────────────────────────────────── */
        .table-wrap { overflow-x:auto; border-radius:8px; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        thead th {
            background:#0f3460; color:#4cc9f0;
            padding:10px 12px; text-align:left; font-weight:600;
        }
        /* Editable headers show a subtle pencil hint on hover */
        thead th.editable {
            cursor: pointer; user-select: none;
        }
        thead th.editable:hover { color: #7de3f7; }
        thead th.editable::after {
            content: ' ✎';
            font-size: 0.7rem; opacity: 0.5;
        }
        tbody tr:nth-child(even) { background:rgba(255,255,255,0.03); }
        tbody tr:hover { background:rgba(76,201,240,0.08); }
        tbody td { padding:9px 12px; border-bottom:1px solid rgba(255,255,255,0.05); word-break:break-all; }

        /* Rescannable cells in multi-scan mode */
        td.rescannable {
            cursor: pointer;
            transition: background 0.15s;
        }
        td.rescannable:hover { background: rgba(76,201,240,0.15) !important; }
        td.rescannable strong { text-decoration: underline dotted rgba(76,201,240,0.4); }

        /* Highlight the currently selected rescan cell */
        td.rescan-selected {
            background: rgba(244,162,97,0.15) !important;
            outline: 1px solid rgba(244,162,97,0.5);
        }
        td.rescan-selected strong { color: #f4a261; }

        .del-btn { background:transparent; border:1px solid #e63946; color:#e63946; padding:4px 10px; font-size:0.75rem; border-radius:6px; cursor:pointer; }
        .del-btn:hover { background:#e63946; color:#fff; }
        .empty-msg { text-align:center; color:#666; padding:24px; font-size:0.9rem; }
        .badge { display:inline-block; background:#4cc9f0; color:#1a1a2e; border-radius:20px; padding:2px 10px; font-size:0.75rem; font-weight:700; margin-left:8px; }

        /* ── Rename popup overlay ─────────────────────────────────────────────
           Sits over everything, fades in when shown, fades out when dismissed.
           Styled to match the existing manual-entry card feel.               */
        #rename-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #rename-overlay.show {
            opacity: 1; pointer-events: auto;
        }
        #rename-box {
            background: #16213e; border-radius: 16px;
            padding: 24px 20px; width: 90%; max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            transform: translateY(10px);
            transition: transform 0.25s ease;
        }
        #rename-overlay.show #rename-box { transform: translateY(0); }
        #rename-box h3 {
            font-size: 0.9rem; text-transform: uppercase;
            letter-spacing: 1px; color: #4cc9f0; margin-bottom: 14px;
        }
        #rename-box input {
            width: 100%; padding: 10px 14px;
            border-radius: 8px; border: 1px solid #333;
            background: #0f3460; color: #eee;
            font-size: 0.95rem; outline: none; margin-bottom: 14px;
        }
        #rename-box input:focus { border-color: #4cc9f0; }
        .rename-btns { display: flex; gap: 10px; }
        .rename-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        #rename-save   { background: #4cc9f0; color: #1a1a2e; }
        #rename-cancel { background: #444; color: #eee; }
    </style>
</head>
<body>

<!-- ── Rename popup overlay ──────────────────────────────────────────────── -->
<div id="rename-overlay">
    <div id="rename-box">
        <h3 id="rename-title">Rename Column</h3>
        <input type="text" id="rename-input" placeholder="Enter column name..." />
        <div class="rename-btns">
            <button id="rename-save"   onclick="saveRename()">Save</button>
            <button id="rename-cancel" onclick="closeRename()">Cancel</button>
        </div>
    </div>
</div>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header>
    <!-- Hamburger menu — floating top-left inside header -->
    <div id="menu-wrap">
        <div id="menu-btn" onclick="toggleMenu()" title="Options">
            <span></span><span></span><span></span>
        </div>
        <div id="menu-dropdown">
            <div class="menu-item" onclick="toggleMultiScan()">
                <span>&#9635; Multi-Scan</span>
                <div class="toggle-switch" id="multiScanToggle">
                    <div class="toggle-track"></div>
                </div>
            </div>
        </div>
    </div>
    <div style="width:32px;height:32px;background:#4cc9f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a1a2e;font-size:1rem;">T</div>
    <h1>WCS Barcode Scanner &rarr; CSV &nbsp;<span style="font-size:0.75rem;color:#888;">Philip Gilson</span></h1>
</header>

<!-- ── Additional-scan prompt (shown above scanner in rescan/multi mode) ─── -->
<div id="rescan-prompt"></div>

<!-- ── Camera card ────────────────────────────────────────────────────────── -->
<div class="card" id="cameraCard">
    <h2>&#128247; Camera Scanner</h2>
    <div id="scanner-container">
        <video id="camVideo" autoplay muted playsinline></video>
        <div class="scan-overlay"><div class="scan-line"></div></div>
        <div id="scan-flash"></div>
        <div id="tap-ripple"></div>
        <div id="tap-hint">TAP TO SCAN</div>
        <div id="scan-label"></div>
        <!-- Torch/flashlight button — only shown on mobile when camera active -->
        <button id="torch-btn" onclick="toggleTorch()" title="Toggle flashlight">&#128294;</button>
    </div>
    <div id="confirm-banner"><span>&#10003;</span>&nbsp;<span id="confirm-text"></span></div>
    <div id="hint"></div>
    <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Camera not started</span>
    </div>
    <div class="btn-row">
        <button id="startBtn" onclick="startScanner()">&#9654; Start Camera</button>
        <button id="stopBtn"  onclick="stopScanner()">&#9209; Stop Camera</button>
    </div>
</div>

<!-- ── Manual entry ───────────────────────────────────────────────────────── -->
<div class="card">
    <h2>&#9999;&#65039; Manual Entry</h2>
    <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Type or paste a barcode value..." />
        <button onclick="addManual()">Add</button>
    </div>
</div>

<!-- ── Records table ──────────────────────────────────────────────────────── -->
<div class="card">
    <h2>&#128203; Scanned Records <span class="badge" id="countBadge">0</span></h2>
    <div class="table-wrap">
        <table id="recordsTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody">
                <tr><td colspan="5" class="empty-msg">No barcodes scanned yet.</td></tr>
            </tbody>
        </table>
    </div>
    <div class="btn-row" style="margin-top:16px;">
        <button id="clearBtn"    onclick="clearAll()">&#128465; Clear All</button>
        <button id="downloadBtn" onclick="downloadCSV()">&#11015; Download CSV</button>
    </div>
</div>

<script>
    // ── State ─────────────────────────────────────────────────────────────────
    var records     = [];
    var scanning    = false;
    var bannerTimer = null;
    var lastCode    = '';
    var lastTime    = 0;
    var COOLDOWN    = 3000;

    // ── Multi-scan state ──────────────────────────────────────────────────────
    // multiScan: feature toggle from the dropdown menu
    // colNames:  user-editable display names for the two data columns
    // rescanTarget: when user clicks a cell to overwrite, stores { rowIdx, col }
    //               null = normal new-record mode
    var multiScan    = false;
    var colNames     = { value: 'Barcode Value', item: 'Scanned Item' };
    var rescanTarget = null;

    // ── Rename popup state ────────────────────────────────────────────────────
    var renameCol    = null;   // which col key is being renamed: 'value' or 'item'
    var renameInputEl = null;

    // ── Engine selection ──────────────────────────────────────────────────────
    // BarcodeDetector = Android/mobile Chrome 83+ (confirmed scanning)
    // ZXing           = desktop Chrome / Firefox / Safari (confirmed scanning)
    //
    // BarcodeDetector also exists in desktop Chrome 88+ so we MUST check for
    // a mobile device too — otherwise the tap-gated native path runs on laptops.
    var isMobile  = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    var useNative = isMobile && (typeof BarcodeDetector !== 'undefined');
    console.log('Engine:', useNative ? 'BarcodeDetector (native)' : 'ZXing', '| mobile:', isMobile);

    var nativeDetector = null;
    var nativeStream   = null;
    var nativeLoop     = null;
    var zxReader       = null;

    // ── ZXing decode hints ───────────────────────────────────────────────────
    // Two hint maps for a two-pass decode strategy:
    //
    //   Pass 1 — zxHintsPreferred (no EAN-8):
    //     Tried first on every tap. EAN-8 is excluded because it only applies
    //     to tiny retail items (lip balm etc) and false-positives on partial
    //     slices of longer barcodes like Code 128 / ITF.
    //
    //   Pass 2 — zxHintsFallback (adds EAN-8):
    //     Only tried if pass 1 finds nothing. Gives maximum compatibility
    //     without sacrificing accuracy on the common case.
    //
    //   TRY_HARDER on both passes: essential for ITF (uniform narrow bars).
    var PREFERRED_FORMATS = [
        ZXing.BarcodeFormat.CODE_128,    // serial/inventory labels
        ZXing.BarcodeFormat.ITF,         // 12-digit shipping/warehouse
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.CODE_93,
        ZXing.BarcodeFormat.CODABAR,
        ZXing.BarcodeFormat.EAN_13,      // retail 13-digit
        ZXing.BarcodeFormat.UPC_A,       // retail 12-digit
        ZXing.BarcodeFormat.UPC_E,       // compressed UPC 8-digit
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.DATA_MATRIX,
        ZXing.BarcodeFormat.PDF_417,
        ZXing.BarcodeFormat.AZTEC
    ];
    var zxHintsPreferred = (function() {
        var h = new Map();
        h.set(ZXing.DecodeHintType.TRY_HARDER, true);
        h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, PREFERRED_FORMATS);
        return h;
    })();
    var zxHintsFallback = (function() {
        var h = new Map();
        h.set(ZXing.DecodeHintType.TRY_HARDER, true);
        h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,
            PREFERRED_FORMATS.concat([ZXing.BarcodeFormat.EAN_8])
        );
        return h;
    })();
    // Convenience alias — readers that do one-shot decoding use preferred by default
    var zxHints = zxHintsPreferred;

    // ── Tap-to-scan gate ──────────────────────────────────────────────────────
    // Scan loops run continuously but only commit when tapPending = true.
    var tapPending = false;

    document.addEventListener('DOMContentLoaded', function() {
        // multiScan starts false — div toggle has no browser-restorable state
        renameInputEl = document.getElementById('rename-input');

        var container = document.getElementById('scanner-container');
        function onTap(e) {
            if (!scanning) return;

            // Ripple at tap point
            var rect   = container.getBoundingClientRect();
            var cx     = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - rect.left;
            var cy     = (e.changedTouches ? e.changedTouches[0].clientY : e.clientY) - rect.top;
            var ripple = document.getElementById('tap-ripple');
            ripple.style.left = cx + 'px';
            ripple.style.top  = cy + 'px';
            ripple.classList.remove('burst');
            void ripple.offsetWidth;
            ripple.classList.add('burst');

            // Reset cooldown on every explicit tap — user is deliberately asking
            // to scan. The multi-scan double-commit risk no longer exists because
            // tapPending is never auto-armed after the first scan.
            lastCode = ''; lastTime = 0;
            if (useNative) {
                tapPending = true;
            } else {
                zxArmTap();
            }
        }
        container.addEventListener('click',    onTap);
        container.addEventListener('touchend', onTap, { passive: true });

        // Close menu when clicking outside it
        document.addEventListener('click', function(e) {
            var wrap = document.getElementById('menu-wrap');
            if (!wrap.contains(e.target)) {
                document.getElementById('menu-dropdown').classList.remove('open');
            }
        });

        // Rename popup: Enter key saves
        renameInputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') saveRename();
            if (e.key === 'Escape') closeRename();
        });

        renderTableHead();
        loadData();
    });

    // ── Menu ──────────────────────────────────────────────────────────────────
    function toggleMenu() {
        document.getElementById('menu-dropdown').classList.toggle('open');
    }

    function toggleMultiScan() {
        multiScan = !multiScan;
        var tog = document.getElementById('multiScanToggle');
        if (multiScan) { tog.classList.add('on'); }
        else           { tog.classList.remove('on'); clearRescanTarget(); }
        renderTableHead();
        renderTable();
        updateScanLabel();
    }

    // ── Persist ───────────────────────────────────────────────────────────────
    function loadData() {
        try {
            window.db.get('barcode_records').then(function(d) {
                if (d && d.records)   { records  = d.records;   renderTable(); }
                if (d && d.colNames)  { colNames  = d.colNames;  renderTableHead(); }
                // multiScan is intentionally NOT restored — always starts disabled
            }).catch(function(){});
        } catch(e) {}
    }
    function saveData() {
        try { window.db.set('barcode_records', { records:records, colNames:colNames }); } catch(e) {}
    }

    // ── Rename popup ──────────────────────────────────────────────────────────
    function openRename(col) {
        renameCol = col;
        document.getElementById('rename-title').textContent = 'Rename Column';
        renameInputEl.value = colNames[col];
        document.getElementById('rename-overlay').classList.add('show');
        setTimeout(function() { renameInputEl.focus(); renameInputEl.select(); }, 50);
    }
    function closeRename() {
        document.getElementById('rename-overlay').classList.remove('show');
        renameCol = null;
    }
    function saveRename() {
        var raw = renameInputEl.value.trim();
        if (!raw) { closeRename(); return; }
        // Save in Proper Case — capitalise first letter of each word
        colNames[renameCol] = raw.replace(/\w\S*/g, function(w) {
            return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
        });
        closeRename();
        renderTableHead();
        updateScanLabel();
        saveData();
    }

    // ── Rescan target ─────────────────────────────────────────────────────────
    // Called when user clicks a data cell in the table during multi-scan mode.
    // col = 'value' (primary barcode) or 'item' (secondary scanned item).
    function selectRescan(rowIdx, col) {
        rescanTarget = { rowIdx: rowIdx, col: col };

        // Amber overlay on scanner viewport — signals rescan mode
        document.getElementById('scanner-container').classList.add('rescan-mode');
        document.getElementById('tap-hint').textContent = 'TAP TO RESCAN';

        // Show the "Now Scan Additional" prompt when overwriting the item column
        if (col === 'item') {
            document.getElementById('rescan-prompt').textContent = '🔍 Scan ' + colNames.item;
            document.getElementById('rescan-prompt').style.display = 'block';
        } else {
            document.getElementById('rescan-prompt').style.display = 'none';
        }

        renderTable(); // re-render to highlight the selected cell
        updateScanLabel();
    }

    function clearRescanTarget() {
        rescanTarget = null;
        document.getElementById('scanner-container').classList.remove('rescan-mode');
        document.getElementById('rescan-prompt').style.display = 'none';
        if (scanning) {
            document.getElementById('tap-hint').textContent = 'TAP TO SCAN';
        }
        renderTable();
        updateScanLabel();
    }

    // ── Scan label ───────────────────────────────────────────────────────────
    // Computes the correct "Scan [header]" text based on current state and
    // updates the top-left overlay on the video. Called wherever state changes.
    function updateScanLabel() {
        var el = document.getElementById('scan-label');
        // Only show the label when multi-scan is active and camera is running.
        // Always pull colNames live — user may have renamed headers since last scan.
        if (!scanning || !multiScan) { el.style.display = 'none'; return; }

        // Which column are we about to scan next?
        // No rescanTarget = fresh row, so next scan fills the value (primary) col.
        // rescanTarget set = we are mid-row, next scan fills that target col.
        var col = (rescanTarget !== null) ? rescanTarget.col : 'value';
        el.textContent = 'Scan ' + colNames[col];
        el.style.display = 'block';
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    // Mobile: always use BarcodeDetector — it handles camera orientation
    // natively (OS-level). ZXing on mobile reads frames via canvas which loses
    // Android EXIF rotation → garbled barcode output.
    // We intersect our wanted formats with what the device actually supports
    // so we never pass an unsupported format (which silently causes no detections).
    // Desktop: always ZXing (canvas tap-decode path, confirmed working).
    function startScanner() {
        setStatus('loading', 'Starting camera...');
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display  = '';

        if (!useNative) { startZXing(); return; }

        // Pass ALL formats the device supports to BarcodeDetector.
        // Hardcoding a subset risks silently dropping formats that the device
        // names differently (e.g. some firmware reports code_128 variants
        // under different keys). Letting the device use its full list means
        // every barcode type it can physically decode will fire.
        BarcodeDetector.getSupportedFormats().then(function(supported) {
            console.log('BarcodeDetector all supported formats:', supported);
            startNative(supported);
        }).catch(function() {
            // getSupportedFormats unavailable — pass no formats list, which
            // causes BarcodeDetector to use its default (all supported)
            startNative(null);
        });
    }

    // ══════════════════════════════════════════════════════════════════════════
    // MOBILE — Dual engine: BarcodeDetector (rAF) + ZXing (stream callback)
    //
    // Both engines share the same getUserMedia stream. Whichever detects a
    // barcode first calls commitScan and sets tapPending=false, which silences
    // the other. This covers barcodes the device chipset can't handle natively
    // (BarcodeDetector) — ZXing provides pure-software fallback for those.
    // ══════════════════════════════════════════════════════════════════════════
    var zxMobileReader = null;  // second ZXing instance, mobile-only

    function startNative(formats) {
        var opts = (formats && formats.length) ? { formats: formats } : {};
        nativeDetector = new BarcodeDetector(opts);

        // ── getUserMedia constraints ──────────────────────────────────────────
        // ONLY use constraints that are valid at the getUserMedia level.
        // focusMode is NOT a valid top-level MediaTrackConstraint — it must be
        // applied via applyConstraints() AFTER the stream is open, otherwise
        // some devices reject the entire getUserMedia call silently.
        navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
                facingMode: { ideal: 'environment' },
                width:      { ideal: 1280 },
                height:     { ideal: 720 }
            }
        })
        .then(function(stream) {
            nativeStream = stream;
            var track = stream.getVideoTracks()[0];

            // ── Autofocus: applied after stream opens via applyConstraints ────
            // advanced[] is the correct way to request focusMode — never put it
            // in the top-level getUserMedia constraints.
            if (track && track.applyConstraints) {
                track.applyConstraints({
                    advanced: [{ focusMode: 'continuous' }]
                }).catch(function(){});
            }

            // ── Torch: show button on mobile, probe by attempting to apply ────
            // getCapabilities().torch is unreliable on many Android devices —
            // it often returns {} even when torch IS supported.
            // Instead, show the button on all mobile devices and attempt
            // applyConstraints({torch:true}) when tapped. Hide on failure.
            if (isMobile) {
                document.getElementById('torch-btn').style.display = 'flex';
            }

            var video = document.getElementById('camVideo');
            video.srcObject = stream;
            video.play();

            // ── Poll until video has real frames ─────────────────────────────
            function waitForFrame() {
                if (video.videoWidth > 0) {
                    video.style.opacity = '0.99';
                    requestAnimationFrame(function() {
                        video.style.opacity = '1';
                        scanning = true;
                        setStatus('active', 'Tap viewport to scan');
                        document.getElementById('tap-hint').style.display = 'block';
                        updateScanLabel();

                        // ── Engine 1: BarcodeDetector (native OS chip) ────────
                        // Runs every rAF frame — handles QR, EAN-13, UPC-A etc.
                        // fast because it runs in native code outside the JS thread.
                        nativeScanFrame();

                        // ── Engine 2: ZXing canvas decode (software) ──────────
                        // Runs every 300ms — catches formats BarcodeDetector misses
                        // (Code128 variants, ITF, Codabar). Canvas is full frame so
                        // no barcode is accidentally outside the crop region.
                        // Two ZXing reader instances: preferred (no EAN-8) tried
                        // first each tick, fallback (with EAN-8) only if preferred
                        // finds nothing — prevents EAN-8 false positives.
                        var zxC = document.createElement('canvas');
                        zxC.style.display = 'none';
                        document.body.appendChild(zxC);
                        var zxPref = new ZXing.BrowserMultiFormatReader(zxHintsPreferred);
                        var zxFb   = new ZXing.BrowserMultiFormatReader(zxHintsFallback);

                        function zxTick() {
                            if (!scanning) { zxC.remove(); return; }
                            setTimeout(zxTick, 300);
                            if (!tapPending) return;
                            var vid = document.getElementById('camVideo');
                            if (!vid || vid.videoWidth === 0 || vid.readyState < 2) return;

                            // Full frame draw — no crop, no rotation transform.
                            // Chrome handles EXIF rotation when drawImage reads
                            // from a <video> element on Android.
                            zxC.width  = vid.videoWidth;
                            zxC.height = vid.videoHeight;
                            zxC.getContext('2d').drawImage(vid, 0, 0);

                            var result = null;
                            try { result = zxPref.decodeFromCanvas(zxC); } catch(e) {}
                            if (!result) {
                                try { result = zxFb.decodeFromCanvas(zxC); } catch(e) {}
                            }
                            if (!result) return;

                            var code    = result.getText();
                            var fmt     = result.getBarcodeFormat();
                            var fmtName = (ZXing.BarcodeFormat[fmt] || String(fmt)).toLowerCase();
                            if (code && code.length >= 3 &&
                                !(code === lastCode && (Date.now() - lastTime) < COOLDOWN)) {
                                tapPending = false;
                                lastCode = code; lastTime = Date.now();
                                commitScan(code, fmtName);
                            }
                        }
                        zxTick();
                    });
                } else {
                    requestAnimationFrame(waitForFrame);
                }
            }
            requestAnimationFrame(waitForFrame);
        }).catch(function(err) {
            setStatus('error', 'Camera error: ' + err.message);
            console.error('getUserMedia error:', err);
            document.getElementById('startBtn').style.display = '';
            document.getElementById('stopBtn').style.display  = 'none';
        });
    }

    function nativeScanFrame() {
        if (!scanning) return;
        var video = document.getElementById('camVideo');
        if (video.readyState >= 2 && video.videoWidth > 0) {
            nativeDetector.detect(video).then(function(barcodes) {
                if (barcodes.length > 0 && tapPending) {
                    var bc = barcodes[0]; var now = Date.now();
                    if (!(bc.rawValue === lastCode && (now - lastTime) < COOLDOWN)) {
                        tapPending = false;
                        lastCode = bc.rawValue; lastTime = now;
                        commitScan(bc.rawValue, bc.format);
                    }
                }
            }).catch(function(){}).finally(function() {
                if (scanning) nativeLoop = requestAnimationFrame(nativeScanFrame);
            });
        } else {
            if (scanning) nativeLoop = requestAnimationFrame(nativeScanFrame);
        }
    }

    function stopNative() {
        if (nativeLoop)   { cancelAnimationFrame(nativeLoop); nativeLoop = null; }
        // zxMobileTick, zxMobileCanvas, and rotCanvas remove themselves
        // when they next fire and see scanning=false
        if (nativeStream) { nativeStream.getTracks().forEach(function(t){t.stop();}); nativeStream = null; }
        document.getElementById('camVideo').srcObject = null;
    }

    // ══════════════════════════════════════════════════════════════════════════
    // DESKTOP — ZXing (Chrome, Firefox, Safari)
    //
    // Architecture:
    //   getUserMedia → video element (display only, no ZXing stream ownership)
    //   On tap: rAF loop draws video frames to a canvas, calls decodeFromCanvas
    //           which is SYNCHRONOUS in ZXing — it either returns a Result or
    //           throws NotFoundException. We catch the throw and retry next frame.
    //
    // Why not decodeFromVideoDevice callback? ZXing deduplicates internally —
    // the same barcode held in frame never re-fires the callback after the first
    // decode, making click-to-scan impossible to implement reliably.
    // ══════════════════════════════════════════════════════════════════════════
    // ═══════════════════════════════════════════════════════════════════════════
    // ZXing — used on desktop, AND on mobile when BarcodeDetector falls back.
    //
    // TWO sub-modes selected by isMobile:
    //
    //   DESKTOP  → canvas-based tap decode (decodeFromCanvas, synchronous).
    //              We own getUserMedia so we can draw frames ourselves.
    //              This sidesteps ZXing's internal deduplication in the
    //              decodeFromVideoDevice callback loop.
    //
    //   MOBILE   → decodeFromVideoDevice with tap gate.
    //              We do NOT use canvas here because phone cameras apply EXIF
    //              rotation in the video stream but NOT when drawn to canvas —
    //              the barcode arrives rotated/mirrored → wrong Code128 sub-table
    //              → garbled characters like "#02"0.!;(&" instead of the real value.
    //              decodeFromVideoDevice lets ZXing read the stream natively,
    //              respecting orientation, so Code 128 decodes correctly.
    // ═══════════════════════════════════════════════════════════════════════════
    var zxStream    = null;   // MediaStream for desktop canvas path
    var zxCanvas    = null;   // hidden canvas, desktop only
    var zxScanLoop  = null;   // rAF handle, desktop canvas path

    function startZXing() {
        zxReader = new ZXing.BrowserMultiFormatReader(zxHintsPreferred);

        if (isMobile) {
            // ── Mobile ZXing path ─────────────────────────────────────────────
            // decodeFromConstraints ignores facingMode in ZXing 0.21.3 and just
            // picks the first camera (usually front-facing). Fix: we call
            // getUserMedia ourselves with facingMode:'environment', set the
            // stream on the video element, then point ZXing at that element.
            // ZXing reads the live stream natively (correct orientation, no
            // canvas EXIF issues) while we control which camera is used.
            navigator.mediaDevices.getUserMedia({
                audio: false,
                video: {
                    facingMode: { ideal: 'environment' },
                    width:  { ideal: 1280 },
                    height: { ideal: 720 }
                }
            }).then(function(stream) {
                zxStream = stream;
                var video = document.getElementById('camVideo');
                video.srcObject = stream;
                // Wait for video to be playing before handing it to ZXing
                return video.play();
            }).then(function() {
                // Now ZXing attaches to the already-playing video element
                return zxReader.decodeFromVideoDevice(null, 'camVideo',
                    function(result, err) {
                        if (!result || !tapPending) return;
                        var code = result.getText();
                        var fmt  = result.getBarcodeFormat();
                        var fmtName = (ZXing.BarcodeFormat[fmt] || String(fmt)).toLowerCase();
                        if (!code || code.length < 3) return;
                        tapPending = false;
                        lastCode = code; lastTime = Date.now();
                        commitScan(code, fmtName);
                    }
                );
            }).then(function() {
                scanning = true;
                setStatus('active', 'Tap viewport to scan');
                document.getElementById('tap-hint').style.display = 'block';
                updateScanLabel();
            }).catch(function(err) {
                setStatus('error', 'Camera error: ' + err.message);
                console.error('ZXing mobile error:', err);
                document.getElementById('startBtn').style.display = '';
                document.getElementById('stopBtn').style.display  = 'none';
            });

        } else {
            // ── Desktop ZXing path: getUserMedia + canvas tap decode ───────────
            // We own the stream; on tap we draw a frame and call decodeFromCanvas
            // (synchronous). This lets us do true click-to-scan without fighting
            // ZXing's internal callback deduplication.
            zxCanvas = document.createElement('canvas');
            zxCanvas.style.display = 'none';
            document.body.appendChild(zxCanvas);

            navigator.mediaDevices.getUserMedia({
                audio: false,
                video: { width: { ideal: 1280 }, height: { ideal: 720 } }
            }).then(function(stream) {
                zxStream = stream;
                var video = document.getElementById('camVideo');
                video.srcObject = stream;
                return video.play();
            }).then(function() {
                scanning = true;
                setStatus('active', 'Tap viewport to scan');
                document.getElementById('tap-hint').style.display = 'block';
                updateScanLabel();
            }).catch(function(err) {
                setStatus('error', 'Camera error: ' + err.message);
                console.error('ZXing desktop error:', err);
                document.getElementById('startBtn').style.display = '';
                document.getElementById('stopBtn').style.display  = 'none';
            });
        }
    }

    // ── zxDoScan: rAF tick for desktop canvas path ────────────────────────────
    // Draws current video frame → canvas → synchronous decodeFromCanvas.
    // Retries every frame until a barcode is found or tap is cancelled.
    function zxDoScan() {
        if (!tapPending || !scanning) return;

        var video = document.getElementById('camVideo');
        if (!video || video.videoWidth === 0 || video.readyState < 2) {
            zxScanLoop = requestAnimationFrame(zxDoScan);
            return;
        }

        zxCanvas.width  = video.videoWidth;
        zxCanvas.height = video.videoHeight;
        zxCanvas.getContext('2d').drawImage(video, 0, 0);

        try {
            // Pass 1: preferred formats (no EAN-8) — avoids false positives
            var result = null;
            try { result = zxReader.decodeFromCanvas(zxCanvas); } catch(e1) {
                // Pass 2: fallback includes EAN-8 for genuine tiny-item barcodes
                try {
                    var fbReader = new ZXing.BrowserMultiFormatReader(zxHintsFallback);
                    result = fbReader.decodeFromCanvas(zxCanvas);
                } catch(e2) { /* nothing found in either pass */ }
            }
            if (!result) throw new Error('not found');
            var code    = result.getText();
            var fmt     = result.getBarcodeFormat();
            var fmtName = (ZXing.BarcodeFormat[fmt] || String(fmt)).toLowerCase();
            var now     = Date.now();
            if (code && code.length >= 3 &&
                !(code === lastCode && (now - lastTime) < COOLDOWN)) {
                tapPending = false;
                lastCode = code; lastTime = now;
                commitScan(code, fmtName);
                return;
            }
        } catch (e) { /* NotFoundException — no barcode in this frame, retry */ }

        zxScanLoop = requestAnimationFrame(zxDoScan);
    }

    // ── zxArmTap: called by onTap / auto-chain ────────────────────────────────
    // Desktop: starts the canvas rAF decode loop.
    // Mobile:  just sets tapPending — the decodeFromVideoDevice callback checks it.
    function zxArmTap() {
        tapPending = true;
        // Do NOT reset lastCode — cooldown must stay active so the same barcode
        // still in frame on a second tap doesn't double-commit
        if (!isMobile) {
            if (zxScanLoop) { cancelAnimationFrame(zxScanLoop); zxScanLoop = null; }
            zxDoScan();
        }
    }

    function stopZXing() {
        tapPending = false;
        if (zxScanLoop)  { cancelAnimationFrame(zxScanLoop); zxScanLoop = null; }
        if (zxStream)    { zxStream.getTracks().forEach(function(t){t.stop()}); zxStream = null; }
        if (zxCanvas)    { zxCanvas.remove(); zxCanvas = null; }
        if (zxReader)    { zxReader.reset(); zxReader = null; }
        var video = document.getElementById('camVideo');
        if (video) video.srcObject = null;
    }

    // ── Stop ──────────────────────────────────────────────────────────────────
    // ── Torch / flashlight ───────────────────────────────────────────────────
    // Uses the ImageCapture API to toggle the device torch via track constraints.
    // torch:true is a MediaTrackConstraint — silently ignored on desktop or
    // devices that don't expose the torch capability.
    var torchOn = false;

    // ── Torch / flashlight ────────────────────────────────────────────────────
    // Works on Android Chrome (torch constraint via MediaTrackConstraints) and
    // iOS Safari 15.4+ (same API). We do NOT rely on getCapabilities().torch
    // because many devices return {} from getCapabilities even when torch works.
    // Instead: show the button on all mobile devices and attempt applyConstraints
    // when tapped — hide the button only if applyConstraints actually rejects.
    function toggleTorch() {
        if (!nativeStream) return;
        var track = nativeStream.getVideoTracks()[0];
        if (!track || !track.applyConstraints) {
            document.getElementById('torch-btn').style.display = 'none';
            return;
        }
        torchOn = !torchOn;
        track.applyConstraints({ advanced: [{ torch: torchOn }] })
            .then(function() {
                // Constraint accepted — update button state
                var btn = document.getElementById('torch-btn');
                torchOn ? btn.classList.add('on') : btn.classList.remove('on');
            })
            .catch(function() {
                // Device genuinely doesn't support torch constraint — hide button
                torchOn = false;
                document.getElementById('torch-btn').style.display = 'none';
            });
    }
    function hideTorchBtn() {
        torchOn = false;
        var btn = document.getElementById('torch-btn');
        btn.style.display = 'none';
        btn.classList.remove('on');
        if (nativeStream) {
            var track = nativeStream.getVideoTracks()[0];
            if (track && track.applyConstraints) {
                track.applyConstraints({ advanced: [{ torch: false }] }).catch(function(){});
            }
        }
    }

    function stopScanner() {
        scanning = false;
        hideTorchBtn();
        if (useNative) { stopNative(); } else { stopZXing(); }
        lastCode = ''; lastTime = 0; tapPending = false;
        document.getElementById('startBtn').style.display = '';
        document.getElementById('stopBtn').style.display  = 'none';
        document.getElementById('confirm-banner').classList.remove('show');
        document.getElementById('tap-hint').style.display = 'none';
        document.getElementById('scan-label').style.display = 'none';
        clearRescanTarget();
        setStatus('idle', 'Camera stopped');
        setHint('');
    }

    // ── Commit ────────────────────────────────────────────────────────────────
    // If rescanTarget is set: overwrite that cell and clear the target.
    // Otherwise: add a new record as normal.
    function commitScan(code, format) {
        // Flash feedback always fires
        var fl = document.getElementById('scan-flash');
        fl.classList.remove('pop'); void fl.offsetWidth; fl.classList.add('pop');

        var card = document.getElementById('cameraCard');
        card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');

        document.getElementById('confirm-text').textContent = code + '  (' + format + ')';
        var banner = document.getElementById('confirm-banner');
        banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');
        clearTimeout(bannerTimer);
        bannerTimer = setTimeout(function() {
            document.getElementById('confirm-banner').classList.remove('show');
        }, 3000);

        if (rescanTarget !== null) {
            // ── Rescan / item-chain overwrite ────────────────────────────────
            // Write scanned value into the targeted field, then decide what next:
            // If we just filled the 'item' column (end of chain) → clear target.
            // If we just filled the 'value' column via manual rescan → clear too.
            records[rescanTarget.rowIdx][rescanTarget.col] = code;
            renderTable(); saveData();
            clearRescanTarget();
        } else {
            // ── Normal new-record mode ───────────────────────────────────────
            addRecord(code, format);

            // Multi-scan chain: after saving the first column (value), set up
            // rescanTarget pointing to the item column on this same row.
            // Do NOT auto-arm tapPending — the barcode from scan 1 is still in
            // frame and would instantly fill item with the same value.
            // User must tap explicitly to trigger the second scan.
            if (multiScan) {
                var newIdx = records.length - 1;
                rescanTarget = { rowIdx: newIdx, col: 'item' };
                document.getElementById('scanner-container').classList.add('rescan-mode');
                document.getElementById('tap-hint').textContent = 'TAP TO SCAN';
                document.getElementById('rescan-prompt').textContent = '🔍 Scan ' + colNames.item;
                document.getElementById('rescan-prompt').style.display = 'block';
                tapPending = false;          // explicitly disarmed — wait for tap
                // Do NOT reset lastCode here — keeping it means the just-scanned
                // barcode is still in cooldown. If it stays in frame when the user
                // taps for the item scan, the cooldown check blocks it, preventing
                // the same value from auto-filling the item column.
                renderTable();
                updateScanLabel();
            }
        }

        setHint('');
    }

    // ── UI ────────────────────────────────────────────────────────────────────
    function setStatus(type, msg) {
        var dot = document.getElementById('statusDot');
        dot.className = 'dot';
        if (type === 'active') dot.classList.add('active');
        if (type === 'error')  dot.classList.add('error');
        document.getElementById('statusText').textContent = msg;
    }
    function setHint(msg) { document.getElementById('hint').textContent = msg; }

    // ── Records ───────────────────────────────────────────────────────────────
    function addRecord(value, format) {
        var ts = new Date().toISOString().replace('T',' ').substring(0,19);
        records.push({ value:value, item:'', format:format||'manual', ts:ts });
        renderTable(); saveData();
    }
    function addManual() {
        var input = document.getElementById('manualInput');
        var val = input.value.trim(); if (!val) return;
        addRecord(val, 'manual'); input.value = '';
    }
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('manualInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addManual();
        });

        // Keep --overlay-h CSS variable in sync with the real scan-overlay height
        // so the translateY animation endpoint is always exact regardless of screen size.
        var overlay = document.querySelector('.scan-overlay');
        function syncOverlayH() {
            if (overlay) {
                overlay.style.setProperty('--overlay-h', overlay.offsetHeight + 'px');
            }
        }
        syncOverlayH();
        if (window.ResizeObserver) {
            new ResizeObserver(syncOverlayH).observe(overlay);
        } else {
            window.addEventListener('resize', syncOverlayH);
        }
    });
    function deleteRecord(idx) { records.splice(idx,1); renderTable(); saveData(); }
    function clearAll() { if(!records.length) return; records=[]; clearRescanTarget(); renderTable(); saveData(); }

    // ── Render table head ─────────────────────────────────────────────────────
    // Rebuilds the <thead> row. In multi-scan mode an extra "Scanned Item" column
    // is injected between "Barcode Value" and "Format". Both data column headers
    // are clickable to open the rename popup.
    function renderTableHead() {
        var thead = document.getElementById('tableHead');
        var colSpan = multiScan ? 6 : 5;

        var html = '<tr><th>#</th>';

        // "Barcode Value" header — always editable
        html += '<th class="editable" onclick="openRename(\'value\')">' + esc(colNames.value) + '</th>';

        // "Scanned Item" header — only in multi-scan mode
        if (multiScan) {
            html += '<th class="editable" onclick="openRename(\'item\')">' + esc(colNames.item) + '</th>';
        }

        html += '<th>Format</th><th>Timestamp</th><th></th></tr>';
        thead.innerHTML = html;

        // Keep empty-row colspan in sync
        var emptyRow = document.querySelector('#tableBody .empty-msg');
        if (emptyRow) emptyRow.setAttribute('colspan', colSpan);
    }

    // ── Render table body ─────────────────────────────────────────────────────
    // In multi-scan mode, data cells are clickable to enter rescan mode.
    // The currently selected rescan cell gets the 'rescan-selected' class.
    function renderTable() {
        var tbody = document.getElementById('tableBody');
        var colSpan = multiScan ? 6 : 5;
        document.getElementById('countBadge').textContent = records.length;

        if (!records.length) {
            tbody.innerHTML = '<tr><td colspan="' + colSpan + '" class="empty-msg">No barcodes scanned yet.</td></tr>';
            return;
        }

        tbody.innerHTML = records.map(function(r, i) {
            // Determine if each cell is the selected rescan target
            var valueSelected = rescanTarget && rescanTarget.rowIdx === i && rescanTarget.col === 'value';
            var itemSelected  = rescanTarget && rescanTarget.rowIdx === i && rescanTarget.col === 'item';

            var valueCls = multiScan ? ('rescannable' + (valueSelected ? ' rescan-selected' : '')) : '';
            var itemCls  = multiScan ? ('rescannable' + (itemSelected  ? ' rescan-selected' : '')) : '';

            var valueClick = multiScan ? ' onclick="selectRescan(' + i + ', \'value\')"' : '';
            var itemClick  = multiScan ? ' onclick="selectRescan(' + i + ', \'item\')"'  : '';

            var row = '<tr>';
            row += '<td>' + (i + 1) + '</td>';
            row += '<td class="' + valueCls + '"' + valueClick + '><strong>' + esc(r.value) + '</strong></td>';

            if (multiScan) {
                var itemDisplay = r.item ? ('<strong>' + esc(r.item) + '</strong>') : '<span style="color:#555;font-style:italic;">—</span>';
                row += '<td class="' + itemCls + '"' + itemClick + '>' + itemDisplay + '</td>';
            }

            row += '<td>' + esc(r.format) + '</td>';
            row += '<td>' + esc(r.ts) + '</td>';
            row += '<td><button class="del-btn" onclick="deleteRecord(' + i + ')">&#10005;</button></td>';
            row += '</tr>';
            return row;
        }).join('');
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── CSV ───────────────────────────────────────────────────────────────────
    function downloadCSV() {
        if (!records.length) { setStatus('error','Nothing to export!'); setTimeout(function(){setStatus('idle','');},2000); return; }

        var header = multiScan
            ? ['#', colNames.value, colNames.item, 'Format', 'Timestamp']
            : ['#', colNames.value, 'Format', 'Timestamp'];

        var rows = records.map(function(r, i) {
            var base = [i+1, '"'+r.value.replace(/"/g,'""')+'"'];
            if (multiScan) base.push('"'+(r.item||'').replace(/"/g,'""')+'"');
            base.push('"'+r.format+'"', '"'+r.ts+'"');
            return base;
        });

        var csv = [header.join(',')].concat(rows.map(function(r){return r.join(',');})).join('\r\n');
        var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
        var name = 'barcodes_'+new Date().toISOString().slice(0,10)+'.csv';
        if (window.fs && window.fs.downloadFile) { window.fs.downloadFile(blob,name); }
        else { var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url); }
    }
</script>
</body>
</html>
