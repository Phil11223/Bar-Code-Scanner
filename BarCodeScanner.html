<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee;
            min-height: 100vh; display: flex;
            flex-direction: column; align-items: center; padding: 16px;
        }

        /* ── Header ──────────────────────────────────────────────────────────── */
        header {
            width: 100%; max-width: 600px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding: 12px 16px;
            background: #16213e; border-radius: 12px;
            border-left: 4px solid #4cc9f0;
            position: relative;
        }
        header h1 { font-size: 1.2rem; color: #4cc9f0; flex: 1; }

        /* ── Floating menu (top-left of header) ───────────────────────────────
           The hamburger button sits inside the header flex row.
           The dropdown panel is absolute-positioned relative to the header.   */
        #menu-wrap { position: relative; flex-shrink: 0; }

        #menu-btn {
            width: 36px; height: 36px;
            background: #0f3460; border: 1px solid #4cc9f0;
            border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 4px;
            flex-shrink: 0; transition: background 0.2s;
        }
        #menu-btn:hover { background: #1a4d6e; }
        #menu-btn span {
            display: block; width: 16px; height: 2px;
            background: #4cc9f0; border-radius: 2px;
            transition: all 0.2s;
        }

        #menu-dropdown {
            position: absolute;
            top: calc(100% + 8px); left: 0;
            background: #16213e; border: 1px solid #2a4a6e;
            border-radius: 10px; min-width: 190px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100;
            /* Fade in/out */
            opacity: 0; pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #menu-dropdown.open {
            opacity: 1; pointer-events: auto; transform: translateY(0);
        }
        .menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px; cursor: pointer;
            font-size: 0.88rem; color: #ccc;
            transition: background 0.15s;
            border-radius: 10px;
        }
        .menu-item:hover { background: #0f3460; color: #eee; }

        /* Toggle switch inside menu */
        /* Pure div toggle — no <input>, no browser form-state restoration */
        .toggle-switch {
            position: relative; width: 36px; height: 20px;
            flex-shrink: 0; margin-left: auto;
        }
        .toggle-track {
            position: absolute; inset: 0;
            background: #333; border-radius: 20px;
            transition: background 0.2s; cursor: pointer;
        }
        .toggle-track::after {
            content: ''; position: absolute;
            width: 14px; height: 14px; border-radius: 50%;
            background: #888; top: 3px; left: 3px;
            transition: all 0.2s;
        }
        /* .on class applied by JS — never touched by browser cache */
        .toggle-switch.on .toggle-track { background: #4cc9f0; }
        .toggle-switch.on .toggle-track::after {
            background: #1a1a2e; left: 19px;
        }

        /* ── Cards ───────────────────────────────────────────────────────────── */
        .card {
            width: 100%; max-width: 600px; background: #16213e;
            border-radius: 16px; padding: 20px; margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .card h2 {
            font-size: 0.95rem; text-transform: uppercase;
            letter-spacing: 1px; color: #4cc9f0; margin-bottom: 14px;
        }

        /* ── Rescan prompt (above scanner, hidden by default) ────────────────── */
        #rescan-prompt {
            width: 100%; max-width: 600px;
            background: #0f3460; border: 1px solid #4cc9f0;
            border-radius: 10px; padding: 10px 16px;
            font-size: 0.85rem; color: #4cc9f0; font-weight: 600;
            text-align: center; margin-bottom: 10px;
            display: none;
            animation: fadeSlideIn 0.25s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Scanner container ───────────────────────────────────────────────── */
        #scanner-container {
            position: relative; width: 100%;
            aspect-ratio: 4 / 3; background: #000;
            border-radius: 12px; overflow: hidden;
            cursor: crosshair;
        }
        #camVideo {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            /* Own GPU layer — isolates per-frame video texture updates from
               the scan-line's compositor animation. Without this the video
               repaints bleed into the scan-line layer causing stutter. */
            will-change: transform;
        }
        .scan-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 92%; height: 38%;
            border: 2px solid #4cc9f0; border-radius: 6px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
            z-index: 10; pointer-events: none;
        }
        /* Overlay turns amber when in rescan mode */
        #scanner-container.rescan-mode .scan-overlay {
            border-color: #f4a261;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
        }
        .scan-line {
            position: absolute; left: 0; right: 0; top: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #4cc9f0, transparent);
            /* translateY animates on the GPU compositor — no layout reflow, always smooth.
               alternate bounces the line back up instead of snapping to start.
               will-change promotes to its own layer, preventing paint invalidation. */
            will-change: transform;
            animation: scanLine 1.8s ease-in-out infinite alternate;
        }
        #scanner-container.rescan-mode .scan-line {
            background: linear-gradient(90deg, transparent, #f4a261, transparent);
        }
        @keyframes scanLine {
            0%   { transform: translateY(0); }
            100% { transform: translateY(calc(var(--overlay-h, 120px) - 2px)); }
        }

        #scan-flash {
            position: absolute; inset: 0;
            background: rgba(45,198,83,0.35);
            z-index: 30; pointer-events: none; opacity: 0;
        }
        #scan-flash.pop { animation: flashPop 0.5s ease forwards; }
        @keyframes flashPop { 0%{opacity:1} 100%{opacity:0} }

        #tap-ripple {
            position: absolute; width: 60px; height: 60px;
            border-radius: 50%; background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none; z-index: 20;
        }
        #tap-ripple.burst { animation: rippleBurst 0.4s ease-out forwards; }
        @keyframes rippleBurst {
            0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        #tap-hint {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55); color: #4cc9f0;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
            padding: 4px 14px; border-radius: 20px;
            pointer-events: none; z-index: 25; display: none;
            transition: opacity 0.3s ease;
        }
        #scanner-container.rescan-mode #tap-hint { color: #f4a261; }

        /* ── Scan label (top-left overlay on video) ───────────────────────────
           Shows "Scan [column header]" so the user always knows what they're
           currently scanning. Colour matches the overlay border — blue for
           primary, amber when in rescan/item mode.                           */
        #scan-label {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.6);
            color: #4cc9f0;
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
            padding: 4px 10px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 15;
            display: none;
            transition: color 0.2s ease;
        }
        #scanner-container.rescan-mode #scan-label { color: #f4a261; }

        /* Torch button — top-right corner of scanner, only shown on mobile */
        #torch-btn {
            position: absolute; top: 10px; right: 10px;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.55); border: 1.5px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 1.1rem; cursor: pointer;
            z-index: 15; display: none;
            align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }
        #torch-btn.on { background: rgba(255,220,0,0.85); border-color: #ffd700; color: #1a1a2e; }

        .flash { animation: cardFlash 0.7s ease forwards; }
        @keyframes cardFlash {
            0%   { box-shadow: 0 0 0 0px  rgba(45,198,83,0.9), 0 4px 20px rgba(0,0,0,0.4); }
            40%  { box-shadow: 0 0 0 10px rgba(45,198,83,0.5), 0 4px 20px rgba(0,0,0,0.4); }
            100% { box-shadow: 0 0 0 0px  rgba(45,198,83,0),   0 4px 20px rgba(0,0,0,0.4); }
        }

        #confirm-banner {
            display: none; align-items: center; gap: 10px;
            margin-top: 10px; padding: 10px 14px;
            background: #1a4d2e; border: 1px solid #2dc653;
            border-radius: 8px; font-size: 0.88rem; color: #2dc653; font-weight: 600;
        }
        #confirm-banner.show { display: flex; animation: bannerSlide 0.25s ease; }
        @keyframes bannerSlide {
            from { opacity:0; transform:translateY(-5px); }
            to   { opacity:1; transform:translateY(0); }
        }

        #hint { font-size:0.78rem; color:#888; margin-top:6px; min-height:1.4em; text-align:center; }

        .status-bar {
            display:flex; align-items:center; gap:8px; padding:10px 14px;
            border-radius:8px; font-size:0.85rem; margin-top:12px; background:#0f3460;
        }
        .dot { width:10px; height:10px; border-radius:50%; background:#888; flex-shrink:0; }
        .dot.active { background:#2dc653; animation:pulse 1s infinite; }
        .dot.error  { background:#e63946; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .btn-row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
        button { flex:1; padding:12px 16px; border:none; border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
        #startBtn    { background:#4cc9f0; color:#1a1a2e; }
        #startBtn:hover { background:#3ab8df; }
        #stopBtn     { background:#e63946; color:#fff; display:none; }
        #stopBtn:hover  { background:#c1121f; }
        #clearBtn    { background:#444; color:#eee; }
        #clearBtn:hover { background:#555; }
        #downloadBtn { background:#2dc653; color:#fff; }
        #downloadBtn:hover { background:#25a244; }

        .manual-row { display:flex; gap:8px; margin-top:4px; }
        .manual-row input { flex:1; padding:10px 14px; border-radius:8px; border:1px solid #333; background:#0f3460; color:#eee; font-size:0.9rem; outline:none; }
        .manual-row input:focus { border-color:#4cc9f0; }
        .manual-row button { flex:0 0 auto; padding:10px 18px; background:#4cc9f0; color:#1a1a2e; }

        /* ── Table ───────────────────────────────────────────────────────────── */
        .table-wrap { overflow-x:auto; border-radius:8px; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        thead th {
            background:#0f3460; color:#4cc9f0;
            padding:10px 12px; text-align:left; font-weight:600;
        }
        /* Editable headers show a subtle pencil hint on hover */
        thead th.editable {
            cursor: pointer; user-select: none;
        }
        thead th.editable:hover { color: #7de3f7; }
        thead th.editable::after {
            content: ' ✎';
            font-size: 0.7rem; opacity: 0.5;
        }
        tbody tr:nth-child(even) { background:rgba(255,255,255,0.03); }
        tbody tr:hover { background:rgba(76,201,240,0.08); }
        tbody td { padding:9px 12px; border-bottom:1px solid rgba(255,255,255,0.05); word-break:break-all; }

        /* Rescannable cells in multi-scan mode */
        td.rescannable {
            cursor: pointer;
            transition: background 0.15s;
        }
        td.rescannable:hover { background: rgba(76,201,240,0.15) !important; }
        td.rescannable strong { text-decoration: underline dotted rgba(76,201,240,0.4); }

        /* Highlight the currently selected rescan cell */
        td.rescan-selected {
            background: rgba(244,162,97,0.15) !important;
            outline: 1px solid rgba(244,162,97,0.5);
        }
        td.rescan-selected strong { color: #f4a261; }

        .del-btn { background:transparent; border:1px solid #e63946; color:#e63946; padding:4px 10px; font-size:0.75rem; border-radius:6px; cursor:pointer; }
        .del-btn:hover { background:#e63946; color:#fff; }
        .empty-msg { text-align:center; color:#666; padding:24px; font-size:0.9rem; }
        .badge { display:inline-block; background:#4cc9f0; color:#1a1a2e; border-radius:20px; padding:2px 10px; font-size:0.75rem; font-weight:700; margin-left:8px; }

        /* ── Rename popup overlay ─────────────────────────────────────────────
           Sits over everything, fades in when shown, fades out when dismissed.
           Styled to match the existing manual-entry card feel.               */
        #rename-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #rename-overlay.show {
            opacity: 1; pointer-events: auto;
        }
        #rename-box {
            background: #16213e; border-radius: 16px;
            padding: 24px 20px; width: 90%; max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            transform: translateY(10px);
            transition: transform 0.25s ease;
        }
        #rename-overlay.show #rename-box { transform: translateY(0); }
        #rename-box h3 {
            font-size: 0.9rem; text-transform: uppercase;
            letter-spacing: 1px; color: #4cc9f0; margin-bottom: 14px;
        }
        #rename-box input {
            width: 100%; padding: 10px 14px;
            border-radius: 8px; border: 1px solid #333;
            background: #0f3460; color: #eee;
            font-size: 0.95rem; outline: none; margin-bottom: 14px;
        }
        #rename-box input:focus { border-color: #4cc9f0; }
        .rename-btns { display: flex; gap: 10px; }
        .rename-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        #rename-save   { background: #4cc9f0; color: #1a1a2e; }
        #rename-cancel { background: #444; color: #eee; }
    </style>
</head>
<body>

<!-- ── Rename popup overlay ──────────────────────────────────────────────── -->
<div id="rename-overlay">
    <div id="rename-box">
        <h3 id="rename-title">Rename Column</h3>
        <input type="text" id="rename-input" placeholder="Enter column name..." />
        <div class="rename-btns">
            <button id="rename-save"   onclick="saveRename()">Save</button>
            <button id="rename-cancel" onclick="closeRename()">Cancel</button>
        </div>
    </div>
</div>

<!-- ── Header ────────────────────────────────────────────────────────────── -->
<header>
    <!-- Hamburger menu — floating top-left inside header -->
    <div id="menu-wrap">
        <div id="menu-btn" onclick="toggleMenu()" title="Options">
            <span></span><span></span><span></span>
        </div>
        <div id="menu-dropdown">
            <div class="menu-item" onclick="toggleMultiScan()">
                <span>&#9635; Multi-Scan</span>
                <div class="toggle-switch" id="multiScanToggle">
                    <div class="toggle-track"></div>
                </div>
            </div>
        </div>
    </div>
    <div style="width:32px;height:32px;background:#4cc9f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a1a2e;font-size:1rem;">T</div>
    <h1>WCS Barcode Scanner &rarr; CSV &nbsp;<span style="font-size:0.75rem;color:#888;">Philip Gilson</span></h1>
</header>

<!-- ── Additional-scan prompt (shown above scanner in rescan/multi mode) ─── -->
<div id="rescan-prompt"></div>

<!-- ── Camera card ────────────────────────────────────────────────────────── -->
<div class="card" id="cameraCard">
    <h2>&#128247; Camera Scanner</h2>
    <div id="scanner-container">
        <video id="camVideo" autoplay muted playsinline></video>
        <div class="scan-overlay"><div class="scan-line"></div></div>
        <div id="scan-flash"></div>
        <div id="tap-ripple"></div>
        <div id="tap-hint">TAP TO SCAN</div>
        <div id="scan-label"></div>
        <!-- Torch/flashlight button — only shown on mobile when camera active -->
        <button id="torch-btn" onclick="toggleTorch()" title="Toggle flashlight">&#128294;</button>
    </div>
    <div id="confirm-banner"><span>&#10003;</span>&nbsp;<span id="confirm-text"></span></div>
    <div id="hint"></div>
    <div class="status-bar">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Camera not started</span>
    </div>
    <div class="btn-row">
        <button id="startBtn" onclick="dbg('Start button clicked'); startScanner()">&#9654; Start Camera</button>
        <button id="stopBtn"  onclick="stopScanner()">&#9209; Stop Camera</button>
    </div>
</div>

<!-- ── Manual entry ───────────────────────────────────────────────────────── -->
<div class="card">
    <h2>&#9999;&#65039; Manual Entry</h2>
    <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Type or paste a barcode value..." />
        <button onclick="addManual()">Add</button>
    </div>
</div>

<!-- ── Records table ──────────────────────────────────────────────────────── -->
<div class="card">
    <h2>&#128203; Scanned Records <span class="badge" id="countBadge">0</span></h2>
    <div class="table-wrap">
        <table id="recordsTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody">
                <tr><td colspan="5" class="empty-msg">No barcodes scanned yet.</td></tr>
            </tbody>
        </table>
    </div>
    <div class="btn-row" style="margin-top:16px;">
        <button id="clearBtn"    onclick="clearAll()">&#128465; Clear All</button>
        <button id="downloadBtn" onclick="downloadCSV()">&#11015; Download CSV</button>
    </div>
</div>

<!-- ── Debug panel (remove once scanning works) ──────────────────────────── -->
<div id="debug-panel" style="width:100%;max-width:600px;background:#0d0d1a;border:1px solid #4cc9f0;
     border-radius:10px;padding:12px;margin-bottom:16px;font-family:monospace;font-size:0.75rem;color:#0f0;">
    <div style="color:#4cc9f0;margin-bottom:6px;font-weight:bold;">🔍 Debug Panel</div>
    <div id="dbg-info">Loading...</div>
</div>

<script>
    // ── State ─────────────────────────────────────────────────────────────────
    var records     = [];
    var scanning    = false;
    var tapPending  = false;   // true = user has tapped, one scan allowed
    var tapTimer    = null;    // setTimeout handle — cancels scan attempt after 1s
    var tapSession  = 0;        // increments each tap — invalidates in-flight detect() calls
    var bannerTimer = null;
    var lastCode    = '';
    var lastTime    = 0;
        var COOLDOWN    = 3000;

    // ── Multi-scan state ──────────────────────────────────────────────────────
    // multiScan: feature toggle from the dropdown menu
    // colNames:  user-editable display names for the two data columns
    // rescanTarget: when user clicks a cell to overwrite, stores { rowIdx, col }
    //               null = normal new-record mode
    var multiScan    = false;
    var colNames     = { value: 'Barcode Value', item: 'Scanned Item' };
    var rescanTarget = null;

    // ── Rename popup state ────────────────────────────────────────────────────
    var renameCol    = null;   // which col key is being renamed: 'value' or 'item'
    var renameInputEl = null;

    // ── On-screen debug helper ────────────────────────────────────────────────
    var dbgLines = [];
    function dbg(msg) {
        var ts = new Date().toISOString().slice(11,19);
        dbgLines.unshift('[' + ts + '] ' + msg);
        if (dbgLines.length > 18) dbgLines.length = 18;
        var el = document.getElementById('dbg-info');
        if (el) el.innerHTML = dbgLines.join('<br>');
    }

    // ── Device / engine detection ─────────────────────────────────────────────
    // useNative = true  → mobile path: BarcodeDetector rAF loop (OS-level chip)
    // useNative = false → desktop path: ZXing decodeFromVideoDevice (manages stream)
    var isMobile  = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    // Only use BarcodeDetector on MOBILE — desktop Chrome exposes the API too
    // but it's unreliable there; ZXing is the correct engine for desktop.
    var useNative = isMobile && (typeof BarcodeDetector !== 'undefined');
    console.log('Device: ' + (isMobile ? 'mobile' : 'desktop') + ' | engine: ' + (useNative ? 'BarcodeDetector' : 'ZXing'));

    // ── Engine state ──────────────────────────────────────────────────────────
    // Native path (BarcodeDetector):
    var nativeDetector = null;   // BarcodeDetector instance
    var nativeStream   = null;   // MediaStream (we own it — must stop() on teardown)
    var nativeLoop     = null;   // rAF handle

    // ZXing path (desktop):
    var zxReader = null;         // BrowserMultiFormatReader (manages its own stream)

    // ── startScanner ─────────────────────────────────────────────────────────
    // Routes to the correct engine based on device capability.
    function startScanner() {
        dbg('startScanner() → ' + (useNative ? 'BarcodeDetector' : 'ZXing'));
        setStatus('loading', 'Starting camera...');
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display  = '';
        if (useNative) { startNative(); } else { startZXing(); }
    }

    // ── startNative (mobile / BarcodeDetector) ────────────────────────────────
    // Uses the OS-level barcode chip via BarcodeDetector API.
    // We own the MediaStream → must stop() it ourselves on teardown.
    // rAF loop: detect(videoElement) every frame — no canvas needed.
    function startNative() {
        nativeDetector = new BarcodeDetector({
            formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39',
                      'code_93','codabar','itf','qr_code','data_matrix','pdf417','aztec']
        });
        navigator.mediaDevices.getUserMedia({
            audio: false,
            video: { facingMode: { ideal: 'environment' },
                     width: { ideal: 1280 }, height: { ideal: 720 } }
        }).then(function(stream) {
            nativeStream = stream;

            // ── Autofocus ─────────────────────────────────────────────────────
            // Must use applyConstraints AFTER getUserMedia — adding focusMode
            // inside the getUserMedia constraints causes silent rejection on some
            // devices.
            var track = stream.getVideoTracks()[0];
            dbg('Camera: ' + (track ? track.label : 'no track'));
            if (track && track.applyConstraints) {
                track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] })
                    .catch(function(){});  // silently ignored if unsupported
            }

            var video = document.getElementById('camVideo');
            video.srcObject = stream;
            video.play();

            // ── Wait for real frames before declaring camera ready ────────────
            // videoWidth is 0 until hardware delivers the first real frame.
            // Once ready: show the viewfinder and wait — scan loop does NOT start.
            // nativeScanFrame() is called only from onTap, never automatically.
            function waitForFrames() {
                if (video.videoWidth > 0) {
                    video.style.opacity = '0.99';
                    requestAnimationFrame(function() {
                        video.style.opacity = '1';
                        scanning = true;
                        if (isMobile) document.getElementById('torch-btn').style.display = 'flex';
                        document.getElementById('tap-hint').style.display = 'block';
                        updateScanLabel();
                        setStatus('active', 'Point camera at barcode, then tap to scan');
                        dbg('Native camera ready — waiting for tap');
                    });
                } else {
                    requestAnimationFrame(waitForFrames);
                }
            }
            requestAnimationFrame(waitForFrames);

        }).catch(function(err) {
            dbg('Camera error: ' + err.message);
            setStatus('error', 'Camera error: ' + err.message);
            document.getElementById('startBtn').style.display = '';
            document.getElementById('stopBtn').style.display  = 'none';
        });
    }

    // ── Tap timeout helpers ──────────────────────────────────────────────────
    // cancelTapTimeout: clears any running 1s timeout (called on success/stop).
    // resetTapGate: called when timeout fires — cancels the scan loop and resets
    //               UI back to "waiting for tap" state without stopping the camera.
    function cancelTapTimeout() {
        if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
    }
    function resetTapGate() {
        tapTimer   = null;
        tapPending = false;
        tapSession++;              // invalidates any in-flight detect() from this tap
        // Cancel any scheduled native rAF frame
        if (nativeLoop) { cancelAnimationFrame(nativeLoop); nativeLoop = null; }
        setStatus('active', 'Point camera at barcode, then tap to scan');
        dbg('Tap timeout — no barcode found, waiting for next tap');
    }

    // ── nativeScanFrame ───────────────────────────────────────────────────────
    // Started ONLY from onTap — NEVER auto-started when camera opens.
    // Runs rAF frames until a barcode is found, then stops.
    // Next tap will restart it for the next scan.
    function nativeScanFrame() {
        // Both guards must pass — camera active AND user has tapped
        if (!scanning || !tapPending) return;
        var video = document.getElementById('camVideo');

        // Capture session ID NOW — if resetTapGate fires while detect() is
        // async, it increments tapSession and this stale closure won't commit.
        var mySession = tapSession;

        if (video.readyState >= 2 && video.videoWidth > 0) {
            nativeDetector.detect(video).then(function(barcodes) {
                if (!barcodes.length) return;
                if (mySession !== tapSession) return;  // timeout fired mid-detect — discard
                var bc  = barcodes[0];
                var now = Date.now();
                if (bc.rawValue === lastCode && (now - lastTime) < COOLDOWN) return;
                // ── Valid barcode — consume tap, clear timer, stop loop ────────
                cancelTapTimeout();
                tapPending = false;
                tapSession++;      // increment so any other in-flight frames are discarded
                dbg('BD FOUND: ' + bc.rawValue + ' (' + bc.format + ')');
                lastCode = bc.rawValue; lastTime = now;
                commitScan(bc.rawValue, bc.format);
            }).catch(function(){}).finally(function() {
                // Only reschedule if this tap session is still active
                if (scanning && tapPending && mySession === tapSession) {
                    nativeLoop = requestAnimationFrame(nativeScanFrame);
                }
            });
        } else {
            if (scanning && tapPending && mySession === tapSession) {
                nativeLoop = requestAnimationFrame(nativeScanFrame);
            }
        }
    }

    // ── stopNative ────────────────────────────────────────────────────────────
    function stopNative() {
        if (nativeLoop)   { cancelAnimationFrame(nativeLoop); nativeLoop = null; }
        if (nativeStream) { nativeStream.getTracks().forEach(function(t){ t.stop(); }); nativeStream = null; }
        document.getElementById('camVideo').srcObject = null;
        nativeDetector = null;
    }

    // ── startZXing (desktop) ──────────────────────────────────────────────────
    // ZXing's decodeFromVideoDevice manages its own getUserMedia stream and video
    // element. It fires the callback on every successful decode — no canvas loop
    // or setInterval needed. We just handle results in the callback.
    function startZXing() {
        // No hints map — plain constructor scans all formats by default.
        zxReader = new ZXing.BrowserMultiFormatReader();

        // decodeFromVideoDevice: null deviceId = default camera
        // Returns a Promise that resolves when scanning STARTS (not when it stops).
        zxReader.decodeFromVideoDevice(null, 'camVideo', function(result, err) {
            if (!result)     return;   // err fires on every non-decoded frame — ignore
            dbg('ZXing cb: result=' + !!result + ' tapPending=' + tapPending + ' code=' + (result ? result.getText() : '-'));
            if (!tapPending) return;   // tap gate — only accept a result after a tap

            var code    = result.getText();
            var fmt     = result.getBarcodeFormat();
            var fmtName = (ZXing.BarcodeFormat[fmt] || String(fmt)).toLowerCase();
            var now     = Date.now();
            if (!code || code.length < 3) return;
            if (code === lastCode && (now - lastTime) < COOLDOWN) {
                dbg('ZXing COOLDOWN blocked: ' + code);
                return;
            }
            cancelTapTimeout();
            tapPending = false;
            tapSession++;
            dbg('ZXing FOUND: ' + code + ' (' + fmtName + ')');
            lastCode = code; lastTime = now;
            commitScan(code, fmtName);
        }).then(function() {
            scanning = true;
            document.getElementById('tap-hint').style.display = 'block';
            updateScanLabel();
            setStatus('active', 'Scanning... point camera at barcode');
            dbg('ZXing engine live');
        }).catch(function(err) {
            dbg('ZXing error: ' + err.message);
            setStatus('error', 'Camera error: ' + err.message);
            document.getElementById('startBtn').style.display = '';
            document.getElementById('stopBtn').style.display  = 'none';
        });
    }

    // ── stopZXing ─────────────────────────────────────────────────────────────
    function stopZXing() {
        if (zxReader) { zxReader.reset(); zxReader = null; }
    }

    // ── stopScanner ───────────────────────────────────────────────────────────
    // Routes teardown to the correct engine, then resets shared UI state.
    function stopScanner() {
        scanning   = false;
        cancelTapTimeout();
        tapPending = false;   // clear gate so next session starts clean
        if (useNative) { stopNative(); } else { stopZXing(); }
        hideTorchBtn();
        lastCode = ''; lastTime = 0;
        document.getElementById('startBtn').style.display = '';
        document.getElementById('stopBtn').style.display  = 'none';
        document.getElementById('confirm-banner').classList.remove('show');
        document.getElementById('tap-hint').style.display = 'none';
        document.getElementById('scan-label').style.display = 'none';
        clearRescanTarget();
        setStatus('idle', 'Camera stopped');
        setHint('');
    }

    // ── Torch / flashlight ────────────────────────────────────────────────────
    // Native path owns nativeStream. ZXing path lets the video element own the
    // stream via srcObject. getActiveStream() covers both cases.
    var torchOn = false;
    function getActiveStream() {
        if (nativeStream) return nativeStream;
        var vid = document.getElementById('camVideo');
        return (vid && vid.srcObject) ? vid.srcObject : null;
    }
    function toggleTorch() {
        var stream = getActiveStream();
        dbg('torch tapped — stream=' + !!stream + ' torchOn=' + torchOn);
        if (!stream) { dbg('torch: no stream'); return; }
        var track = stream.getVideoTracks()[0];
        if (!track) { dbg('torch: no track'); return; }
        if (!track.applyConstraints) {
            dbg('torch: applyConstraints missing');
            document.getElementById('torch-btn').style.display = 'none'; return;
        }
        torchOn = !torchOn;
        track.applyConstraints({ advanced: [{ torch: torchOn }] })
            .then(function() {
                var btn = document.getElementById('torch-btn');
                torchOn ? btn.classList.add('on') : btn.classList.remove('on');
                dbg('torch: ' + (torchOn ? 'ON' : 'OFF'));
            })
            .catch(function(e) {
                dbg('torch: FAILED — ' + (e && e.message ? e.message : String(e)));
                torchOn = false;
                document.getElementById('torch-btn').style.display = 'none';
            });
    }
    function hideTorchBtn() {
        torchOn = false;
        var btn = document.getElementById('torch-btn');
        btn.style.display = 'none';
        btn.classList.remove('on');
        var stream = getActiveStream();
        if (stream) {
            var track = stream.getVideoTracks()[0];
            if (track && track.applyConstraints) {
                track.applyConstraints({ advanced: [{ torch: false }] }).catch(function(){});
            }
        }
    }

    // ── Menu ──────────────────────────────────────────────────────────────────
    function toggleMenu() {
        document.getElementById('menu-dropdown').classList.toggle('open');
    }

    function toggleMultiScan() {
        multiScan = !multiScan;
        var tog = document.getElementById('multiScanToggle');
        if (multiScan) { tog.classList.add('on'); }
        else           { tog.classList.remove('on'); clearRescanTarget(); }
        renderTableHead();
        renderTable();
        updateScanLabel();
    }

    // ── Persist ───────────────────────────────────────────────────────────────
    function loadData() {
        try {
            var raw = localStorage.getItem('barcode_records');
            if (raw) {
                var d = JSON.parse(raw);
                if (d.records)  { records  = d.records;  renderTable(); }
                if (d.colNames) { colNames  = d.colNames; renderTableHead(); }
            }
        } catch(e) { dbg('loadData error: ' + e); }
    }
    function saveData() {
        try {
            localStorage.setItem('barcode_records',
                JSON.stringify({ records: records, colNames: colNames }));
        } catch(e) { dbg('saveData error: ' + e); }
    }

    // ── Rename column popup ───────────────────────────────────────────────────
    function openRename(col) {
        renameCol = col;
        document.getElementById('rename-title').textContent = 'Rename Column';
        renameInputEl.value = colNames[col];
        document.getElementById('rename-overlay').classList.add('show');
        setTimeout(function() { renameInputEl.focus(); renameInputEl.select(); }, 50);
    }
    function closeRename() {
        document.getElementById('rename-overlay').classList.remove('show');
        renameCol = null;
    }
    function saveRename() {
        var raw = renameInputEl.value.trim();
        if (!raw) { closeRename(); return; }
        colNames[renameCol] = raw.replace(/\w\S*/g, function(w) {
            return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
        });
        closeRename();
        renderTableHead();
        updateScanLabel();
        saveData();
    }

    // ── Rescan target ─────────────────────────────────────────────────────────
    function selectRescan(rowIdx, col) {
        rescanTarget = { rowIdx: rowIdx, col: col };
        document.getElementById('scanner-container').classList.add('rescan-mode');
        document.getElementById('tap-hint').textContent = 'TAP TO RESCAN';
        if (col === 'item') {
            document.getElementById('rescan-prompt').textContent = '\u{1F50D} Scan ' + colNames.item;
            document.getElementById('rescan-prompt').style.display = 'block';
        } else {
            document.getElementById('rescan-prompt').style.display = 'none';
        }
        renderTable();
        updateScanLabel();
    }
    function clearRescanTarget() {
        rescanTarget = null;
        cancelTapTimeout();            // kill any running 1s timer
        tapPending   = false;          // gate closes — next scan needs a fresh tap
        tapSession++;                  // invalidate any in-flight detect()
        document.getElementById('scanner-container').classList.remove('rescan-mode');
        document.getElementById('rescan-prompt').style.display = 'none';
        if (scanning) document.getElementById('tap-hint').textContent = 'TAP TO SCAN';
        renderTable();
        updateScanLabel();
    }

    // ── Scan label overlay ────────────────────────────────────────────────────
    function updateScanLabel() {
        var el = document.getElementById('scan-label');
        if (!scanning || !multiScan) { el.style.display = 'none'; return; }
        var col = (rescanTarget !== null) ? rescanTarget.col : 'value';
        el.textContent = 'Scan ' + colNames[col];
        el.style.display = 'block';
    }

    // ── Commit ────────────────────────────────────────────────────────────────
    // If rescanTarget is set: overwrite that cell and clear the target.
    // Otherwise: add a new record as normal.
    function commitScan(code, format) {
        // Flash feedback always fires
        var fl = document.getElementById('scan-flash');
        fl.classList.remove('pop'); void fl.offsetWidth; fl.classList.add('pop');

        var card = document.getElementById('cameraCard');
        card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');

        document.getElementById('confirm-text').textContent = code + '  (' + format + ')';
        var banner = document.getElementById('confirm-banner');
        banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');
        clearTimeout(bannerTimer);
        bannerTimer = setTimeout(function() {
            document.getElementById('confirm-banner').classList.remove('show');
        }, 3000);

        if (rescanTarget !== null) {
            // ── Rescan / item-chain overwrite ────────────────────────────────
            // Write scanned value into the targeted field, then decide what next:
            // If we just filled the 'item' column (end of chain) → clear target.
            // If we just filled the 'value' column via manual rescan → clear too.
            records[rescanTarget.rowIdx][rescanTarget.col] = code;
            renderTable(); saveData();
            clearRescanTarget();
        } else {
            // ── Normal new-record mode ───────────────────────────────────────
            addRecord(code, format);

            // Multi-scan chain: after saving the first column (value), set up
            // rescanTarget pointing to the item column on this same row.
            // Do NOT reset lastCode here — keeping the cooldown active prevents the
            // frame and would instantly fill item with the same value.
            // User must tap explicitly to trigger the second scan.
            if (multiScan) {
                var newIdx = records.length - 1;
                rescanTarget = { rowIdx: newIdx, col: 'item' };
                document.getElementById('scanner-container').classList.add('rescan-mode');
                document.getElementById('rescan-prompt').textContent = '🔍 Scan ' + colNames.item;
                document.getElementById('rescan-prompt').style.display = 'block';
                // Do NOT reset lastCode here — keeping it in cooldown prevents the
                // just-scanned barcode from auto-filling the item column if it stays
                // in frame. The 3s cooldown window gives the user time to move the
                // camera to the item barcode.
                renderTable();
                updateScanLabel();
            }
        }

        setHint('');
        // Reset status to idle — dot goes grey, message clearly says "tap to scan"
        setStatus('idle', 'Tap the viewfinder to scan');
    }

    // ── UI ────────────────────────────────────────────────────────────────────
    function setStatus(type, msg) {
        var dot = document.getElementById('statusDot');
        dot.className = 'dot';
        if (type === 'active') dot.classList.add('active');
        if (type === 'error')  dot.classList.add('error');
        document.getElementById('statusText').textContent = msg;
    }
    function setHint(msg) { document.getElementById('hint').textContent = msg; }

    // ── Records ───────────────────────────────────────────────────────────────
    function addRecord(value, format) {
        var ts = new Date().toISOString().replace('T',' ').substring(0,19);
        records.push({ value:value, item:'', format:format||'manual', ts:ts });
        renderTable(); saveData();
    }
    function addManual() {
        var input = document.getElementById('manualInput');
        var val = input.value.trim(); if (!val) return;
        addRecord(val, 'manual'); input.value = '';
    }
    document.addEventListener('DOMContentLoaded', function() {
        renameInputEl = document.getElementById('rename-input');

        // ── Tap handler ───────────────────────────────────────────────────────
        // Tap enables one scan attempt. The camera viewfinder stays live at all
        // times — tap just unlocks the detection gate for a single result.
        var container = document.getElementById('scanner-container');
        function onTap(e) {
            if (!scanning) return;

            // ── Ripple visual feedback ────────────────────────────────────────
            var rect   = container.getBoundingClientRect();
            var cx     = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - rect.left;
            var cy     = (e.changedTouches ? e.changedTouches[0].clientY : e.clientY) - rect.top;
            var ripple = document.getElementById('tap-ripple');
            ripple.style.left = cx + 'px';
            ripple.style.top  = cy + 'px';
            ripple.classList.remove('burst');
            void ripple.offsetWidth;
            ripple.classList.add('burst');

            // ── Unlock one scan ───────────────────────────────────────────────
            // Set the gate, then explicitly kick off the native loop if on mobile.
            // ZXing (desktop) already has its own internal loop — the gate alone
            // is enough to let the next callback through.
            // ── Start scan gate ───────────────────────────────────────────
            // Clear any leftover timer and open a fresh session.
            cancelTapTimeout();
            tapSession++;          // new session — kills any stale in-flight detects
            tapPending = true;
            setStatus('active', 'Scanning...');
            dbg('TAP registered — session=' + tapSession + ' engine=' + (useNative ? 'native' : 'ZXing'));

            // No timeout — tapPending stays open until ZXing finds a barcode.
            // A new tap cancels the current session via tapSession++, so stale
            // results are always discarded safely.
            // tapTimer = setTimeout(resetTapGate, ...);  // disabled

            if (useNative) {
                // Cancel any previous loop handle before starting fresh
                if (nativeLoop) { cancelAnimationFrame(nativeLoop); nativeLoop = null; }
                nativeScanFrame();
            }
            // ZXing (desktop): decodeFromVideoDevice runs its own loop —
            // tapPending gate in the callback handles accepting/rejecting results
        }
        // On mobile, touchend fires then ~300ms later a ghost click fires too.
        // We use a flag to swallow that ghost click so each physical tap = 1 session.
        var lastTouchEnd = 0;
        container.addEventListener('touchend', function(e) {
            lastTouchEnd = Date.now();
            onTap(e);
        });
        container.addEventListener('click', function(e) {
            // If a touchend fired within the last 500ms this is a ghost click — ignore it
            if (Date.now() - lastTouchEnd < 500) return;
            onTap(e);
        });

        // Close hamburger menu when clicking outside it
        document.addEventListener('click', function(e) {
            var wrap = document.getElementById('menu-wrap');
            if (wrap && !wrap.contains(e.target)) {
                document.getElementById('menu-dropdown').classList.remove('open');
            }
        });

        // Rename popup keyboard shortcuts
        renameInputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter')  saveRename();
            if (e.key === 'Escape') closeRename();
        });

        // Manual input: Enter key submits
        document.getElementById('manualInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addManual();
        });

        // Keep --overlay-h CSS variable in sync with actual scan-overlay height
        // so the scan-line translateY animation always lands exactly at the bottom
        var overlay = document.querySelector('.scan-overlay');
        function syncOverlayH() {
            if (overlay) overlay.style.setProperty('--overlay-h', overlay.offsetHeight + 'px');
        }
        syncOverlayH();
        if (window.ResizeObserver) {
            new ResizeObserver(syncOverlayH).observe(overlay);
        } else {
            window.addEventListener('resize', syncOverlayH);
        }

        renderTableHead();
        loadData();
        dbg('DOM ready — page bootstrapped');
    });
    function deleteRecord(idx) { records.splice(idx,1); renderTable(); saveData(); }
    function clearAll() { if(!records.length) return; records=[]; clearRescanTarget(); renderTable(); saveData(); }

    // ── Render table head ─────────────────────────────────────────────────────
    // Rebuilds the <thead> row. In multi-scan mode an extra "Scanned Item" column
    // is injected between "Barcode Value" and "Format". Both data column headers
    // are clickable to open the rename popup.
    function renderTableHead() {
        var thead = document.getElementById('tableHead');
        var colSpan = multiScan ? 6 : 5;

        var html = '<tr><th>#</th>';

        // "Barcode Value" header — always editable
        html += '<th class="editable" onclick="openRename(\'value\')">' + esc(colNames.value) + '</th>';

        // "Scanned Item" header — only in multi-scan mode
        if (multiScan) {
            html += '<th class="editable" onclick="openRename(\'item\')">' + esc(colNames.item) + '</th>';
        }

        html += '<th>Format</th><th>Timestamp</th><th></th></tr>';
        thead.innerHTML = html;

        // Keep empty-row colspan in sync
        var emptyRow = document.querySelector('#tableBody .empty-msg');
        if (emptyRow) emptyRow.setAttribute('colspan', colSpan);
    }

    // ── Render table body ─────────────────────────────────────────────────────
    // In multi-scan mode, data cells are clickable to enter rescan mode.
    // The currently selected rescan cell gets the 'rescan-selected' class.
    function renderTable() {
        var tbody = document.getElementById('tableBody');
        var colSpan = multiScan ? 6 : 5;
        document.getElementById('countBadge').textContent = records.length;

        if (!records.length) {
            tbody.innerHTML = '<tr><td colspan="' + colSpan + '" class="empty-msg">No barcodes scanned yet.</td></tr>';
            return;
        }

        tbody.innerHTML = records.map(function(r, i) {
            // Determine if each cell is the selected rescan target
            var valueSelected = rescanTarget && rescanTarget.rowIdx === i && rescanTarget.col === 'value';
            var itemSelected  = rescanTarget && rescanTarget.rowIdx === i && rescanTarget.col === 'item';

            var valueCls = multiScan ? ('rescannable' + (valueSelected ? ' rescan-selected' : '')) : '';
            var itemCls  = multiScan ? ('rescannable' + (itemSelected  ? ' rescan-selected' : '')) : '';

            var valueClick = multiScan ? ' onclick="selectRescan(' + i + ', \'value\')"' : '';
            var itemClick  = multiScan ? ' onclick="selectRescan(' + i + ', \'item\')"'  : '';

            var row = '<tr>';
            row += '<td>' + (i + 1) + '</td>';
            row += '<td class="' + valueCls + '"' + valueClick + '><strong>' + esc(r.value) + '</strong></td>';

            if (multiScan) {
                var itemDisplay = r.item ? ('<strong>' + esc(r.item) + '</strong>') : '<span style="color:#555;font-style:italic;">—</span>';
                row += '<td class="' + itemCls + '"' + itemClick + '>' + itemDisplay + '</td>';
            }

            row += '<td>' + esc(r.format) + '</td>';
            row += '<td>' + esc(r.ts) + '</td>';
            row += '<td><button class="del-btn" onclick="deleteRecord(' + i + ')">&#10005;</button></td>';
            row += '</tr>';
            return row;
        }).join('');
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── CSV ───────────────────────────────────────────────────────────────────
    function downloadCSV() {
        if (!records.length) { setStatus('error','Nothing to export!'); setTimeout(function(){setStatus('idle','');},2000); return; }

        var header = multiScan
            ? ['#', colNames.value, colNames.item, 'Format', 'Timestamp']
            : ['#', colNames.value, 'Format', 'Timestamp'];

        var rows = records.map(function(r, i) {
            var base = [i+1, '"'+r.value.replace(/"/g,'""')+'"'];
            if (multiScan) base.push('"'+(r.item||'').replace(/"/g,'""')+'"');
            base.push('"'+r.format+'"', '"'+r.ts+'"');
            return base;
        });

        var csv = [header.join(',')].concat(rows.map(function(r){return r.join(',');})).join('\r\n');
        var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
        var name = 'barcodes_'+new Date().toISOString().slice(0,10)+'.csv';
        if (window.fs && window.fs.downloadFile) { window.fs.downloadFile(blob,name); }
        else { var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url); }
    }
</script>
</body>
</html>
